<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Download</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  /* ---------- Design tokens ---------- */
  :root {
    --ink: #14181c;
    --ink-soft: #5b6570;
    --bg: #f2f4f1;
    --surface: #ffffff;
    --accent: #1e4235;
    --accent-strong: #16302a;
    --line: rgba(20, 24, 28, 0.1);
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 6px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Card ---------- */
  .card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: 0 1px 2px rgba(20, 24, 28, 0.05), 0 20px 48px -24px rgba(20, 24, 28, 0.32);
    padding: 32px;
    animation: settle 420ms var(--ease) both;
  }

  @keyframes settle {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Image frame with registration-mark corners (signature detail) ---------- */
  .frame {
    position: relative;
    padding: 16px;
    margin-bottom: 24px;
  }

  .corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--accent);
  }

  .corner.tl { top: 0; left: 0; border-width: 1.5px 0 0 1.5px; }
  .corner.tr { top: 0; right: 0; border-width: 1.5px 1.5px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 1.5px 1.5px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 1.5px 1.5px 0; }

  .frame img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: var(--radius-sm);
  }

  /* ---------- Reference tag ---------- */
  .tag {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .tag .status {
    color: var(--accent);
    text-transform: uppercase;
  }

  /* ---------- Copy ---------- */
  h1 {
    font-family: "Space Grotesk", -apple-system, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }

  .body-copy {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 26px;
  }

  /* ---------- Download button ---------- */
  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    background: var(--accent);
    color: #fff;
    padding: 14px 22px;
    border: none;
    border-radius: var(--radius-md);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: background 160ms var(--ease), transform 160ms var(--ease);
  }

  .download-btn:hover {
    background: var(--accent-strong);
    transform: translateY(-1px);
  }

  .download-btn:active { transform: translateY(0); }

  .download-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .download-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ---------- Responsive ---------- */
  @media (max-width: 380px) {
    .card { padding: 24px; }
    h1 { font-size: 20px; }
  }

  /* ---------- Motion preference ---------- */
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
    .download-btn { transition: none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="frame">
      <span class="corner tl" aria-hidden="true"></span>
      <span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span>
      <span class="corner br" aria-hidden="true"></span>
      <img src="image.png" alt="Preview of your image">
    </div>
    <div class="tag">
      <span>IMG&ndash;0417</span>
      <span class="status">ready</span>
    </div>
    <h1>Your image is ready</h1>
    <p class="body-copy">Preview it above, then download a copy to your device.</p>
    <a href="image.png" download class="download-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3v11"></path>
        <path d="M7.5 10.5L12 15l4.5-4.5"></path>
        <path d="M4.5 19.5h15"></path>
      </svg>
      <span>Download image</span>
    </a>
  </div>
</body>
</html>
